<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 탭에 표시되는 것 -->
    <title>Top to End</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      .group:hover .group-hover\:scale-105 {
        transform: scale(1.05);
      }
      .transition-transform {
        transition-property: transform;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }
      .transition-colors {
        transition-property: color, background-color, border-color;
        transition-duration: 200ms;
      }
      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        display: none;
      }
      .modal-content {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border-radius: 8px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        z-index: 10000;
        display: none;
      }
    </style>
  </head>
  <body class="bg-white">
    <!-- 캡처 영역 -->
    <div id="capture-area">
      <!-- Header -->
      <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex justify-between items-center h-16">
            <div class="flex items-center">
              <button 
                id="menuToggle"
                class="lg:hidden p-2 rounded-md text-gray-700 hover:text-gray-900"
              >
                <i data-lucide="menu" class="w-6 h-6"></i>
              </button>
              <h1 class="ml-2 lg:ml-0 text-xl font-light tracking-wider brand-name">POINTTWOFIVE · SECOND</h1>
              <img src="src/images/logo.png" alt="logo" class="ml-2 lg:ml-0 aspect-auto max-h-12 brand-logo" />
            </div>
            <div class="flex items-center space-x-6">
              <button class="p-2 rounded-md text-gray-700 hover:text-gray-900">
                <i data-lucide="search" class="w-5 h-5"></i>
              </button>
              <button class="p-2 rounded-md text-gray-700 hover:text-gray-900">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
              </button>
              <button 
                id="settingsBtn"
                class="p-2 rounded-md text-gray-700 hover:text-gray-900"
                title="설정"
              >
                <i data-lucide="settings" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="flex">
        <!-- Sidebar -->
        <!-- 좌측에 있는 메뉴, 아래 a태그들을 수정하여 원하는대로 수정하면 됨 -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out mt-16 lg:mt-0">
          <div class="p-6">
            <nav class="space-y-4">
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">광고문의</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">ALL</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">Bag/Pouch</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">Clothing</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">Shoes</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">Etc</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">FAQ</a>
              <a href="#" class="block text-gray-700 hover:text-gray-900 py-2 text-sm">문의</a>
            </nav>
          </div>
        </aside>

        <!-- Overlay for mobile -->
        <div 
          id="overlay"
          class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden hidden"
        ></div>

        <!-- Main Content -->
        <main class="flex-1 p-6 lg:p-8">
          <div class="max-w-6xl mx-auto">
            <div class="text-center mb-12">
              <h2 class="text-3xl lg:text-4xl font-light text-gray-900 mb-4">
                ALL
              </h2>
              <p class="text-lg text-gray-600">
                 
              </p>
            </div>

            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              <!-- 상품들은 script.js에서 받아옴, 상품의 추가, 삭제 수정을 하려면 script.js에서 수정해야 됨 -->
              <!-- 260424 상품 localStorage에 담아두기로 함 -->
            </div>
          </div>
        </main>
      </div>

      <!-- Footer -->
      <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <div class="flex justify-center text-center mb-8">
            <!-- 하단부 로고 넣는부분 -->
            <img src="src/images/logo.png" alt="logo" class="aspect-auto max-h-12 brand-logo" />
          </div>
          <div class="flex flex-wrap justify-center space-x-8 text-sm text-gray-600">
            <a href="#" class="hover:text-gray-900">링크</a>
            <a href="#" class="hover:text-gray-900">문의처</a>
            <a href="#" class="hover:text-gray-900">개인정보처리방침</a>
            <a href="#" class="hover:text-gray-900">이용약관</a>
          </div>
          <div class="text-center mt-8 text-sm text-gray-500">
            <p><span class="copyright-brand">&copy; 2024 POINTTWOFIVE · SECOND. All rights reserved.</span></p>
            <!-- 하단부 표시 부분 -->
          </div>
        </div>
      </footer>
    </div>

    <!-- Settings Modal -->
    <div id="modalBackdrop" class="modal-backdrop"></div>
    <div id="settingsModal" class="modal-content">
      <div class="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-900">설정</h2>
        <button id="closeModal" class="p-2 rounded-md text-gray-500 hover:text-gray-700">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div class="p-6 space-y-6">
        <!-- 로고 이미지 설정 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">로고 이미지</label>
          <input 
            type="file" 
            id="logoImageInput"
            accept="image/*"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
          <p class="mt-1 text-xs text-gray-500">로고 이미지를 선택하면 자동으로 적용됩니다</p>
        </div>

        <!-- 하단부 내용 입력 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">하단부 내용</label>
          <input 
            type="text" 
            id="copyrightBrandInput"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="하단에 기재할 내용을 적어주세요"
          >
          <p class="mt-1 text-xs text-gray-500">페이지 하단 표시에 사용됩니다</p>
        </div>

        <!-- 상품 관리 -->
        <div>
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-medium text-gray-900">상품 관리</h3>
            <button id="addProductBtn" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
              상품 추가
            </button>
          </div>
          
          <div id="productList" class="space-y-4">
            <!-- 상품 리스트가 여기에 렌더링됨 -->
          </div>
        </div>

        <!-- 확인 버튼 -->
        <div class="border-t border-gray-200 pt-4">
          <button id="confirmBtn" class="w-full px-4 py-3 bg-green-600 text-white rounded-md hover:bg-green-700 font-medium">
            설정 확인
          </button>
        </div>
      </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div id="deleteModalBackdrop" class="modal-backdrop"></div>
    <div id="deleteModal" class="modal-content" style="max-width: 400px;">
      <div class="p-6 text-center">
        <div class="mb-4">
          <i data-lucide="trash-2" class="w-12 h-12 text-red-600 mx-auto"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">상품 삭제</h3>
        <p class="text-gray-600 mb-6">정말로 이 상품을 삭제하시겠습니까?<br>삭제된 상품은 복구할 수 없습니다.</p>
        <div class="flex gap-3">
          <button id="cancelDeleteBtn" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50">
            취소
          </button>
          <button id="confirmDeleteBtn" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
            삭제
          </button>
        </div>
      </div>
    </div>

    <!-- 캡처 버튼 (향후 확장용) -->
    <!-- <button id="captureBtn" class="fixed bottom-4 right-4 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">화면 캡처</button> -->

    <script src="script.js"></script>
  </body>
</html>
